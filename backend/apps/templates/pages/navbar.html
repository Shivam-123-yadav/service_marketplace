<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #f5f7fb;
        }

        /* Navbar */
        .navbar {
            height: 70px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Logo */
        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #4F46E5;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Right Side */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .icon {
            font-size: 18px;
            cursor: pointer;
            color: #6B7280;
            position: relative;
            transition: all 0.3s ease;
        }

        .icon:hover {
            color: #4F46E5;
            transform: scale(1.1);
        }

        /* Notification Badge */
        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            font-size: 10px;
            padding: 3px 7px;
            border-radius: 50%;
            font-weight: 700;
            box-shadow: 0 2px 6px rgba(239, 68, 68, 0.3);
        }

        /* Profile */
        .profile {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            position: relative;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .profile:hover {
            background: #f3f4f6;
        }

        .profile img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid #e5e7eb;
        }

        .profile span {
            font-size: 14px;
            color: #111827;
            font-weight: 600;
        }

        /* Dropdown */
        .dropdown {
            position: absolute;
            top: 65px;
            right: 0;
            width: 200px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            display: none;
            flex-direction: column;
            border: 1px solid #e5e7eb;
            z-index: 1001;
        }

        .dropdown a {
            padding: 12px 16px;
            text-decoration: none;
            color: #6B7280;
            font-size: 14px;
            border-bottom: 1px solid #f3f4f6;
            transition: all 0.3s ease;
        }

        .dropdown a:last-child {
            border-bottom: none;
        }

        .dropdown a:hover {
            background: #f9fafb;
            color: #4F46E5;
            padding-left: 20px;
        }

        .dropdown.active {
            display: flex;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 15px;
            }

            .nav-right {
                gap: 15px;
            }

            .profile span {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">ServiceApp</div>

        <div class="nav-right">
            <!-- Notification -->
            <div class="icon">
                <i class="fa fa-bell"></i>
                <span class="badge">3</span>
            </div>

            <!-- Profile -->
            <div class="profile" onclick="toggleDropdown()">
                <img src="https://i.pravatar.cc/150?img=3" alt="user">
                <span>Shivam</span>

                <div class="dropdown" id="dropdownMenu">
                    <a href="#">Profile</a>
                    <a href="#">Settings</a>
                    <a href="#">Logout</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleDropdown() {
            document.getElementById("dropdownMenu").classList.toggle("active");
        }

        // Close dropdown when clicked outside
        window.onclick = function(e) {
            if (!e.target.closest('.profile')) {
                document.getElementById("dropdownMenu").classList.remove("active");
            }
        }
    </script>

</body>
</html>
