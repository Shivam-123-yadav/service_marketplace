<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: #111827;
            color: #fff;
            position: fixed;
            top: 0;
            left: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Logo */
        .sidebar .logo {
            font-size: 20px;
            font-weight: 600;
            color: #4F46E5;
            margin-bottom: 30px;
            text-align: center;
        }

        /* Menu */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            color: #d1d5db;
            font-size: 14px;
            transition: 0.3s;
        }

        .menu a i {
            font-size: 16px;
        }

        .menu a:hover {
            background: #1f2937;
            color: white;
        }

        /* Active */
        .menu a.active {
            background: #4F46E5;
            color: white;
        }

        /* Bottom */
        .bottom {
            border-top: 1px solid #374151;
            padding-top: 15px;
        }

        .logout {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f87171;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .logout:hover {
            background: #1f2937;
        }

        /* Responsive */
        @media(max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -100%;
                transition: 0.3s;
            }

            .sidebar.active {
                left: 0;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">

        <!-- Top -->
        <div>
            <div class="logo">ServiceApp</div>

            <div class="menu">
                <a href="dashboard.html" class="active">
                    <i class="fa fa-home"></i>
                    Dashboard
                </a>

                <a href="services.html">
                    <i class="fa fa-briefcase"></i>
                    Services
                </a>

                <a href="booking.html">
                    <i class="fa fa-calendar"></i>
                    Bookings
                </a>

                <a href="#">
                    <i class="fa fa-user"></i>
                    Profile
                </a>
            </div>
        </div>

        <!-- Bottom -->
        <div class="bottom">
            <div class="logout">
                <i class="fa fa-sign-out-alt"></i>
                Logout
            </div>
        </div>

    </div>

</body>
</html>
