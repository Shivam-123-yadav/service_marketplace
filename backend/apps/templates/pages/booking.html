{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookings | ServiceHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="{% static 'css/booking.css' %}">
</head>
<body>

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <span>ServiceHub</span>
  </div>

  <p class="nav-label">Main Menu</p>
  <nav class="menu">
    <a href="/api/users/dashboard-page/"><i class="fa fa-gauge-high"></i> Dashboard</a>
    <a href="/api/users/admin-page/"><i class="fa fa-user-shield"></i> Admin Panel</a>
    <a href="/api/users/services-page/"><i class="fa fa-briefcase"></i> Services</a>
    <a href="/api/users/booking-page/" class="active"><i class="fa fa-calendar-check"></i> Bookings</a>
    <a href="/api/users/customer-page/"><i class="fa fa-users"></i> Customers</a>
  </nav>

  <p class="nav-label" style="margin-top:28px;">Settings</p>
  <nav class="menu">
    <a href="#"><i class="fa fa-chart-bar"></i> Reports</a>
    <a href="#"><i class="fa fa-shield-halved"></i> Permissions</a>
    <a href="#"><i class="fa fa-gear"></i> Settings</a>
    <a href="#" onclick="logout()" style="color:#ff6b6b;"><i class="fa fa-right-from-bracket"></i> Logout</a>
  </nav>

  <div class="sidebar-footer">
    <div class="avatar">A</div>
    <div class="user-info">
      <div class="name" id="userName">Admin User</div>
      <div class="role" id="userRole">Super Admin</div>
    </div>
    <i class="fa fa-ellipsis-vertical" style="color:var(--muted);margin-left:auto;font-size:13px;"></i>
  </div>
</aside>

<!-- ═══ MAIN ═══ -->
<div class="main">

  <header class="topbar">
    <div class="page-title">Bookings</div>
    <div class="topbar-right">
      <button class="export-btn"><i class="fa fa-download"></i> Export</button>
      <div class="icon-btn">
        <i class="fa fa-bell" style="font-size:14px;"></i>
        <span class="notif-dot"></span>
      </div>
      <div class="icon-btn"><i class="fa fa-sliders" style="font-size:14px;"></i></div>
      <button class="logout-btn" onclick="logout()"><i class="fa fa-right-from-bracket"></i> Logout</button>
    </div>
  </header>

  <div class="content">

    <!-- KPI strip -->
    <div class="kpi-strip" id="kpiStrip"></div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="filter-tabs" id="filterTabs">
        <button class="ftab active" data-status="all">All <span class="cnt" style="background:rgba(255,255,255,.08);color:var(--muted);"></span></button>
        <button class="ftab" data-status="pending">Pending <span class="cnt" style="background:rgba(251,191,36,.12);color:#fbbf24;"></span></button>
        <button class="ftab" data-status="confirmed">Confirmed <span class="cnt" style="background:rgba(91,110,248,.14);color:var(--accent);"></span></button>
        <button class="ftab" data-status="completed">Completed <span class="cnt" style="background:rgba(0,229,180,.12);color:var(--accent3);"></span></button>
        <button class="ftab" data-status="cancelled">Cancelled <span class="cnt" style="background:rgba(255,107,107,.12);color:#ff6b6b;"></span></button>
      </div>
      <div class="toolbar-right">
        <div class="search-wrap">
          <i class="fa fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search bookings…" oninput="renderTable()" />
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="panel">
      <table>
        <thead>
          <tr>
            <th>#ID</th>
            <th>Customer</th>
            <th>Service</th>
            <th>Date</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="bookingTable"></tbody>
      </table>
    </div>

  </div>
</div>

<!-- ═══ MODAL ═══ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h3>Booking Details</h3>
      <button class="modal-close" onclick="closeModal()"><i class="fa fa-xmark"></i></button>
    </div>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="{% static 'js/booking.js' %}"></script>

</body>
</html>
